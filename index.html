<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --light-bg:#faf5f0;--light-bg-alt:#ffffff;--light-bg-hover:#f0ede8;--light-border:#e5ddd4;--light-text:#2d2620;--light-text-muted:#8a8a8a;--light-shadow:rgba(0,0,0,0.04);
  --dark-bg:#0f1117;--dark-bg-alt:#161b22;--dark-bg-hover:#1c2333;--dark-border:#30363d;--dark-text:#f0f6fc;--dark-text-muted:#8b949e;--dark-shadow:rgba(0,0,0,0.3);
  --color-primary:#4f46e5;--color-green:#16a34a;--color-teal:#14b8a6;--color-warning:#f59e0b;--color-error:#ef4444;--color-purple:#8b5cf6;--color-pink:#ec4899;
}
body.light-mode{--bg:var(--light-bg);--bg-alt:var(--light-bg-alt);--bg-hover:var(--light-bg-hover);--border:var(--light-border);--text:var(--light-text);--text-muted:var(--light-text-muted);--shadow:var(--light-shadow)}
body.dark-mode{--bg:var(--dark-bg);--bg-alt:var(--dark-bg-alt);--bg-hover:var(--dark-bg-hover);--border:var(--dark-border);--text:var(--dark-text);--text-muted:var(--dark-text-muted);--shadow:var(--dark-shadow)}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s;-webkit-font-smoothing:antialiased;font-size:13px}
.mono{font-family:'DM Mono','SF Mono','Roboto Mono',Consolas,monospace}
button{cursor:pointer;font-family:inherit}

/* Header */
header{background:var(--bg-alt);border-bottom:1px solid var(--border);padding:18px 40px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px var(--shadow)}
.header-content{max-width:1440px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{font-size:24px;font-weight:700;color:#2a9c6b;letter-spacing:-0.5px}
.header-logo .meta-badge{font-size:10px;color:#1877F2;font-weight:600;background:rgba(24,119,242,0.1);padding:3px 10px;border-radius:4px;margin-left:10px;vertical-align:middle;letter-spacing:0.05em;text-transform:uppercase}
.header-subtitle{font-size:11px;color:var(--text-muted);margin-top:2px}
.header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.date-picker{display:flex;gap:6px;align-items:center}
.date-input{padding:6px 10px;font-size:11px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;outline:none;transition:border-color .15s}
.date-input:focus{border-color:var(--color-primary)}
.date-label{font-size:10px;color:var(--text-muted);font-weight:600}
.filter-btn{padding:6px 16px;font-size:11px;font-weight:600;border:none;background:var(--color-primary);color:#fff;border-radius:8px;cursor:pointer;transition:all .15s}
.filter-btn:hover{opacity:0.85;transform:translateY(-1px)}
.quick-btns{display:flex;gap:2px;background:var(--bg);padding:3px;border-radius:8px;border:1px solid var(--border)}
.quick-btn{padding:5px 12px;font-size:10px;font-weight:500;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:6px;transition:all .15s}
.quick-btn:hover{background:var(--bg-alt)}
.quick-btn.active{background:var(--bg-alt);color:var(--color-primary);font-weight:600;box-shadow:0 1px 3px var(--shadow)}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.icon-btn:hover{background:var(--border);transform:translateY(-1px)}

/* Top Tabs */
.top-tabs{background:var(--bg-alt);border-bottom:2px solid var(--border);position:sticky;top:66px;z-index:150}
.top-tabs-inner{max-width:1440px;margin:0 auto;display:flex;padding:0 40px}
.top-tab{padding:12px 24px;border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:600;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;margin-bottom:-2px}
.top-tab:hover{color:var(--text);background:var(--bg-hover)}
.top-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary)}

/* Sub Tabs */
.sub-tabs{background:var(--bg-alt);border-bottom:1px solid var(--border);position:sticky;top:112px;z-index:100;overflow-x:auto}
.sub-tabs-inner{max-width:1440px;margin:0 auto;display:flex;padding:0 40px;gap:2px}
.sub-tab{padding:9px 16px;border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:11px;font-weight:500;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.sub-tab:hover{color:var(--text)}
.sub-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:600}
.sub-tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* Content */
.content{padding:28px 40px 40px;max-width:1440px;margin:0 auto}

/* Grid */
.grid{display:grid;gap:16px;margin-bottom:20px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.kpi-card{background:var(--bg-alt);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;transition:all .15s}
.kpi-card:hover{box-shadow:0 3px 12px var(--shadow);transform:translateY(-1px)}
.kpi-card .top-bar{position:absolute;top:0;left:0;right:0;height:3px}
.kpi-label{color:var(--text-muted);font-size:9px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;font-weight:600}
.kpi-value{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.1}
.kpi-sub{font-size:9px;color:var(--text-muted);margin-top:4px;line-height:1.4}
.kpi-delta{font-size:9px;font-weight:600;margin-top:3px}
.kpi-delta.up{color:var(--color-green)}.kpi-delta.down{color:var(--color-error)}.kpi-delta.neutral{color:var(--text-muted)}

/* Cards */
.card{background:var(--bg-alt);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;transition:all .15s}
.card:hover{box-shadow:0 3px 12px var(--shadow)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;background:var(--bg-alt);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px 18px}

/* Section */
.section-label{margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.section-label-text{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text)}
.section-badge{font-size:9px;font-weight:600;padding:3px 10px;border-radius:4px;text-transform:uppercase}

/* Tables */
table{width:100%;border-collapse:collapse}
th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);padding:10px 12px;border-bottom:2px solid var(--border);background:var(--bg-alt);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)}
td{font-size:11px;padding:9px 12px;border-bottom:1px solid var(--border)}
th:not(:first-child),td:not(:first-child){text-align:right}
td:not(:first-child){font-family:'DM Mono',monospace;font-weight:500}
tr:hover td{background:var(--bg-hover)}
td.good{color:var(--color-green)}
td.warn{color:var(--color-warning)}
td.bad{color:var(--color-error)}

/* Creative */
.creative-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.creative-card{background:var(--bg-alt);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s}
.creative-card:hover{box-shadow:0 6px 20px var(--shadow);transform:translateY(-3px)}
.creative-card.top-highlight{border-left:3px solid var(--color-green)}
.creative-card.bottom-highlight{border-left:3px solid var(--color-error)}
.creative-thumb{width:100%;height:90px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.creative-thumb img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:2px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.creative-thumb .type-badge{position:absolute;top:6px;right:6px;font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,0.6);color:#fff;text-transform:uppercase}
.creative-info{padding:12px}
.creative-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.creative-campaign{font-size:9px;color:var(--text-muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.creative-metrics{display:flex;gap:10px;font-size:9px;color:var(--text-muted);flex-wrap:wrap}
.creative-metrics b{color:var(--text);font-weight:600}
.copy-quality{display:inline-block;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:auto}
.copy-quality.good{background:rgba(22,163,74,0.1);color:var(--color-green)}
.copy-quality.ok{background:rgba(245,158,11,0.1);color:var(--color-warning)}
.copy-quality.weak{background:rgba(239,68,68,0.1);color:var(--color-error)}

/* Therapy pills */
.therapy-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.therapy-pill{padding:5px 14px;font-size:10px;font-weight:500;border:1px solid var(--border);background:var(--bg-alt);color:var(--text-muted);cursor:pointer;border-radius:20px;transition:all .15s}
.therapy-pill:hover{border-color:var(--text-muted)}
.therapy-pill.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}

/* Chart */
.chart-container{position:relative;height:240px;margin:8px 0}
.chart-container canvas{max-height:240px}
.donut-wrap{display:flex;justify-content:center;align-items:center;min-height:260px}
.donut-wrap canvas{max-height:260px;max-width:260px}

/* Obs cards */
.obs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.obs-card{padding:16px;border-radius:12px;background:var(--bg-alt);border:1px solid var(--border);transition:all .15s}
.obs-card:hover{box-shadow:0 2px 8px var(--shadow)}
.obs-value{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-bottom:6px}
.obs-title{font-size:11px;font-weight:600;color:var(--text)}
.obs-text{font-size:10px;color:var(--text-muted);margin-top:4px;line-height:1.5}

/* Alert */
.alert-box{border-radius:12px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px;font-size:12px;line-height:1.6;margin-bottom:16px;border:1px solid var(--border)}
.alert-icon{font-size:16px;flex-shrink:0}
.alert-title{font-weight:700;color:var(--text);display:block;margin-bottom:3px}
.alert-text{color:var(--text-muted)}

/* Table thumbnail */
.tbl-thumb{width:32px;height:32px;border-radius:5px;overflow:hidden;background:var(--bg);display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;flex-shrink:0;border:1px solid var(--border)}
.tbl-thumb img{width:32px;height:32px;object-fit:cover}
.tbl-thumb-fallback{font-size:14px;opacity:0.4}
.ad-cell{display:flex;align-items:center;gap:10px}
.ad-cell-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}

/* Footer */
footer{padding:16px 40px;border-top:1px solid var(--border);background:var(--bg-alt);font-size:10px;color:var(--text-muted);text-align:center}

/* Responsive */
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){header,.content{padding-left:16px;padding-right:16px}.top-tabs-inner,.sub-tabs-inner{padding:0 16px}.kpi-grid,.g2,.g3,.g4{grid-template-columns:1fr}.creative-grid{grid-template-columns:1fr}}

/* Loading Overlay */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#faf5f0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-spinner{width:48px;height:48px;border:4px solid #e5ddd4;border-top-color:#4f46e5;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:#2d2620}
.loading-sub{font-family:'DM Sans',sans-serif;font-size:11px;color:#8a8a8a}
.live-badge{font-size:9px;font-weight:600;padding:3px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:0.05em;background:rgba(245,158,11,0.1);color:#f59e0b;margin-left:8px;vertical-align:middle}
</style>
</head>

<script>
'use strict';
const C={white:'#fff',dark:'#101828',muted:'#8a8f9e',border:'#dde1e6',blue:'#4f46e5',blueL:'#eef2ff',blueLL:'#f3f4ff',red:'#ef4444',redL:'#fef2f2',green:'#16a34a',greenL:'#f0fdf4',greenLL:'#f0fdf4',orange:'#f59e0b',orangeL:'#fefce8',orangeLL:'#fffbeb',tealD:'#14b8a6',tealL:'#f0fdfa',tealLL:'#f0fdfa',purple:'#8b5cf6',purpleL:'#faf5ff',pink:'#ec4899'};
const TC={Diabetes:{c:C.blue,bg:C.blueLL},'Pre-Diabetes':{c:C.green,bg:C.greenLL},Obesity:{c:C.tealD,bg:C.tealLL},CGM:{c:'#2563eb',bg:'#eff6ff'},BCA:{c:'#e84393',bg:'#fdf2f5'},PCOS:{c:'#9b59b6',bg:'#f9f5fc'}};
const PT=['Diabetes','Obesity','Pre-Diabetes'],ST=['CGM','BCA','PCOS'],ALL_T=PT.concat(ST);
// Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ STATE + DATA (loaded live from /api/data) Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ
var appState={topTab:'programs',subTab:'overall',startDate:'',endDate:'',quickRange:'mtd',creativePill:'All'};
var DAILY_CREATIVES = {};
var CREATIVE_IMAGES = {};
var DATA_LOADED = false;



// Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ HELPERS Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ
function el(tag,a,...ch){var e=document.createElement(tag);if(a)Object.keys(a).forEach(k=>{if(k==='style'&&typeof a[k]==='object')Object.assign(e.style,a[k]);else if(k==='className')e.className=a[k];else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),a[k]);else if(k==='innerHTML')e.innerHTML=a[k];else e[k]=a[k]});ch.forEach(c=>{if(c)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});return e}
function div(a,...c){return el('div',a,...c)}
function span(a,...c){return el('span',a,...c)}
function fmt(n){if(n==null||isNaN(n))return '-';if(n>=100000)return '\u20B9'+(n/100000).toFixed(2)+'L';if(n>=1000)return '\u20B9'+(n/1000).toFixed(1)+'K';return '\u20B9'+Math.round(n)}
function fmtN(n){if(n==null||isNaN(n))return '0';if(n>=100000)return (n/100000).toFixed(2)+'L';if(n>=1000)return (n/1000).toFixed(1)+'K';return n.toLocaleString('en-IN')}
function fmtPct(n){return n==null||isNaN(n)?'0%':n.toFixed(2)+'%'}
function tc(t){return TC[t]?TC[t].c:C.muted}
function tbg(t){return TC[t]?TC[t].bg:'#f5f5f5'}
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function dateLbl(d){var p=d.split('-');return parseInt(p[2])+' '+MONTHS[parseInt(p[1])-1]}

function classifyType(name){
  var n=(name||'').toLowerCase();
  if(n.includes('video')||n.includes(' vo ')||n.includes('ugc')||n.includes('testimonial'))return 'Video';
  if(n.includes('static'))return 'Static';
  if(n.includes('carousel'))return 'Carousel';
  if(n.includes('catalog')||n.match(/^cgm\s*-\s*sales$/i)||n.match(/^pcos\s*\|\s*sales$/i))return 'Catalog';
  var ci=CREATIVE_IMAGES[name];if(ci&&ci.type==='VIDEO')return 'Video';
  return 'Static';
}

function copyQuality(ad,isProgram){
  if(isProgram){
    if(!ad.leads||ad.leads===0)return null;
    var cpl=ad.spend/ad.leads;
    if(cpl<250)return {label:'Strong',cls:'good'};
    if(cpl<400)return {label:'Good',cls:'good'};
    if(cpl<600)return {label:'Average',cls:'ok'};
    return {label:'Review',cls:'weak'};
  } else {
    if(ad.purchases>5)return {label:'Converting',cls:'good'};
    if(ad.atc>20)return {label:'Engaging',cls:'ok'};
    if(ad.spend>3000&&ad.purchases===0)return {label:'Review',cls:'weak'};
    return null;
  }
}

// Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ AGGREGATION FROM DAILY_CREATIVES Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ
var AGG={};
function aggregate(start,end){
  var result={};ALL_T.forEach(function(t){result[t]={spend:0,impressions:0,clicks:0,leads:0,purchases:0,atc:0,ci:0,lpv:0,ads:{},campaigns:{},daily:{}}});
  Object.keys(DAILY_CREATIVES).forEach(function(date){
    if(date<start||date>end)return;
    DAILY_CREATIVES[date].forEach(function(ad){
      var t=ad.t;if(!result[t])return;
      var d=result[t];
      d.spend+=ad.s||0;d.impressions+=ad.i||0;d.clicks+=ad.cl||0;d.leads+=ad.l||0;d.purchases+=ad.p||0;d.atc+=ad.atc||0;d.ci+=ad.ci||0;d.lpv+=ad.lpv||0;
      // Ad-level grouping
      var key=ad.n+'||'+ad.c+'||'+ad.as;
      if(!d.ads[key])d.ads[key]={name:ad.n,campaign:ad.c,adset:ad.as,therapy:t,objective:ad.o,spend:0,impressions:0,clicks:0,leads:0,purchases:0,atc:0,ci:0,lpv:0};
      var a=d.ads[key];a.spend+=ad.s||0;a.impressions+=ad.i||0;a.clicks+=ad.cl||0;a.leads+=ad.l||0;a.purchases+=ad.p||0;a.atc+=ad.atc||0;a.ci+=ad.ci||0;a.lpv+=ad.lpv||0;
      // Campaign-level
      if(!d.campaigns[ad.c])d.campaigns[ad.c]={name:ad.c,spend:0,impressions:0,clicks:0,leads:0,purchases:0,atc:0,ci:0,lpv:0};
      var cc=d.campaigns[ad.c];cc.spend+=ad.s||0;cc.impressions+=ad.i||0;cc.clicks+=ad.cl||0;cc.leads+=ad.l||0;cc.purchases+=ad.p||0;cc.atc+=ad.atc||0;cc.ci+=ad.ci||0;cc.lpv+=ad.lpv||0;
      // Daily (keyed by full date string for cross-month correctness)
      if(!d.daily[date])d.daily[date]={spend:0,leads:0,clicks:0,purchases:0,atc:0,impressions:0};

    Object.keys(d.daily).forEach(function(day){if(!prog.daily[day])prog.daily[day]={spend:0,leads:0};prog.daily[day].spend+=d.daily[day].spend;prog.daily[day].leads+=d.daily[day].leads});
  });
  prog.ctr=prog.impressions>0?parseFloat(((prog.clicks/prog.impressions)*100).toFixed(2)):0;
  prog.cpl=prog.leads>0?Math.round(prog.spend/prog.leads):null;

  var store={spend:0,impressions:0,clicks:0,leads:0,purchases:0,atc:0,ci:0,lpv:0,daily:{}};
  ST.forEach(function(t){var d=result[t];store.spend+=d.spend;store.impressions+=d.impressions;store.clicks+=d.clicks;store.purchases+=d.purchases;store.atc+=d.atc;store.ci+=d.ci;store.lpv+=d.lpv;

  store.cpp=store.purchases>0?Math.round(store.spend/store.purchases):null;

  AGG={byT:result,prog:prog,store:store};
}

// LW aggregation
var AGG_LW={};
function aggregateLW(){
  // Compute LW as last 7 days of the selected range
  var ed=new Date(appState.endDate+'T00:00:00');
  var sd=new Date(ed);sd.setDate(sd.getDate()-6);
  var lwStart=sd.toISOString().split('T')[0];
  var lwEnd=appState.endDate;
  var r={};ALL_T.forEach(function(t){r[t]={spend:0,impressions:0,clicks:0,leads:0,purchases:0,atc:0,ci:0}});
  Object.keys(DAILY_CREATIVES).forEach(function(date){
    if(date<lwStart||date>lwEnd)return;
    DAILY_CREATIVES[date].forEach(function(ad){
      var t=ad.t;if(!r[t])return;
      r[t].spend+=ad.s||0;r[t].impressions+=ad.i||0;r[t].clicks+=ad.cl||0;r[t].leads+=ad.l||0;r[t].purchases+=ad.p||0;r[t].atc+=ad.atc||0;r[t].ci+=ad.ci||0;
    });
  });
  ALL_T.forEach(function(t){
    r[t].ctr=r[t].impressions>0?parseFloat(((r[t].clicks/r[t].impressions)*100).toFixed(2)):0;
    r[t].cpl=r[t].leads>0?Math.round(r[t].spend/r[t].leads):null;
  });
  AGG_LW=r;
}

function movingAvg(arr,window){
  var result=[];
  for(var i=0;i<arr.length;i++){
    var s=Math.max(0,i-Math.floor(window/2)),e=Math.min(arr.length-1,i+Math.floor(window/2)),sum=0,cnt=0;
    for(var j=s;j<=e;j++){sum+=arr[j];cnt++}
    result.push(Math.round(sum/cnt*10)/10);
  }
  return result;
}

// Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ BUILD: CREATIVES Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ
function buildCreatives(therapyList){
  var p=div({});
  var pill=appState.creativePill;
  var pills=div({className:'therapy-pills'});
  ['All'].concat(therapyList).forEach(function(t){
    var btn=el('button',{className:'therapy-pill'+(pill===t?' active':''),textContent:t,onClick:function(){appState.creativePill=t;render()}});
    if(pill===t&&t!=='All'){btn.style.background=tc(t);btn.style.borderColor=tc(t)}
    pills.appendChild(btn);
  });
  p.appendChild(pills);

  // Gather ads
  var ads=[];
  therapyList.forEach(function(t){if(AGG.byT[t])AGG.byT[t].adsList.forEach(function(a){ads.push(a)})});
  if(pill!=='All')ads=ads.filter(function(a){return a.therapy===pill});
  ads.sort(function(a,b){return b.spend-a.spend});

  var isP=therapyList===PT;
  var totSpend=0,totImpr=0,totLeads=0,totPurch=0,totATC=0;
  ads.forEach(function(a){totSpend+=a.spend;totImpr+=a.impressions;totLeads+=a.leads;totPurch+=a.purchases;totATC+=a.atc});

  var kpis=div({className:'kpi-grid'});
  kpis.appendChild(kpiCard('Ads',ads.length+'','',{barColor:C.blue}));
  kpis.appendChild(kpiCard('Total Spend',fmt(totSpend),'',{barColor:C.blue}));
  kpis.appendChild(kpiCard('Impressions',fmtN(totImpr),'',{barColor:C.blue}));
  if(isP)kpis.appendChild(kpiCard('Leads',fmtN(totLeads),'Avg CPL: '+(totLeads>0?fmt(totSpend/totLeads):'-'),{barColor:C.green}));
  else{kpis.appendChild(kpiCard('Purchases',fmtN(totPurch),'',{barColor:C.green}));kpis.appendChild(kpiCard('ATC',fmtN(totATC),'',{barColor:C.orange}))}
  p.appendChild(kpis);

  // Top 5 / Bottom 5
  var qualifying=ads.filter(function(a){return a.spend>=3000});
  var top5keys={},bot5keys={};
  qualifying.slice(0,5).forEach(function(a){top5keys[a.name+'||'+a.campaign]=true});
  qualifying.slice(-5).forEach(function(a){if(!top5keys[a.name+'||'+a.campaign])bot5keys[a.name+'||'+a.campaign]=true});

  // Creative cards grid (top 10)
  p.appendChild(sectionLabel('Top Performers',[{text:'By spend (min \u20B93K for ranking)',bg:C.greenLL,color:C.green}]));
  var grid=div({className:'creative-grid'});
  ads.slice(0,12).forEach(function(ad){
    if(ad.spend<1)return;
    var key=ad.name+'||'+ad.campaign;
    var cls='creative-card';
    if(top5keys[key])cls+=' top-highlight';
    if(bot5keys[key])cls+=' bottom-highlight';
    var card=div({className:cls});
    var thumb=div({className:'creative-thumb'});
    thumb.style.background='linear-gradient(135deg,'+tc(ad.therapy)+'12,'+tc(ad.therapy)+'06)';
    thumb.appendChild(thumbEl(ad.name,ad.therapy));
    thumb.appendChild(span({className:'type-badge',textContent:classifyType(ad.name)}));
    card.appendChild(thumb);
    var info=div({className:'creative-info'});
    info.appendChild(div({className:'creative-name',textContent:ad.name,title:ad.name}));
    info.appendChild(div({className:'creative-campaign',textContent:ad.campaign,title:ad.campaign}));
    var metrics=div({className:'creative-metrics'});
    var ctr=ad.impressions>0?((ad.clicks/ad.impressions)*100).toFixed(1)+'%':'0%';
    metrics.innerHTML='<b>'+fmt(ad.spend)+'</b> ÃÂ· CTR <b>'+ctr+'</b>';
    if(isP&&ad.leads>0)metrics.innerHTML+=' ÃÂ· <b>'+ad.leads+'</b> leads ÃÂ· CPL <b>'+fmt(ad.spend/ad.leads)+'</b>';
    if(!isP&&ad.atc>0)metrics.innerHTML+=' ÃÂ· <b>'+ad.atc+'</b> ATC';
    if(!isP&&ad.purchases>0)metrics.innerHTML+=' ÃÂ· <b>'+ad.purchases+'</b> purch';
    var cq=copyQuality(ad,isP);
    if(cq)metrics.appendChild(span({className:'copy-quality '+cq.cls,textContent:cq.label}));
    info.appendChild(metrics);card.appendChild(info);grid.appendChild(card);
  });
  p.appendChild(grid);

  // Full table
  p.appendChild(sectionLabel('All Ads',[{text:ads.length+' total',bg:C.blueLL,color:C.blue}]));
  var tCard=div({className:'card'});var tBody=div({className:'card-body',style:{overflowX:'auto'}});
  var headers=['#','Ad','Campaign','Therapy','Spend','Impr','Clicks','CTR'];
  if(isP)headers.push('Leads','CPL');
  else headers.push('ATC','CI','Purch','Cost/Purch');
  var rows=ads.map(function(a,i){
    var ctr=a.impressions>0?((a.clicks/a.impressions)*100).toFixed(2)+'%':'0%';
    var nameEl=adNameCell(a.name,a.therapy);
    var cells=[i+1,{el:nameEl},a.campaign,a.therapy,fmt(a.spend),fmtN(a.impressions),fmtN(a.clicks),ctr];
    if(isP){
      var cpl=a.leads>0?Math.round(a.spend/a.leads):null;
      var cplCls=cpl?cpl<400?'good':cpl<600?'warn':'bad':'';
      cells.push(a.leads||0);cells.push({text:cpl?fmt(cpl):'-',cls:cplCls});
    } else {
      var cpp=a.purchases>0?Math.round(a.spend/a.purchases):null;
      var cppCls=cpp?cpp<=4000?'good':cpp<=4800?'warn':'bad':'';
      cells.push(a.atc||0);cells.push(a.ci||0);cells.push(a.purchases||0);cells.push({text:cpp?fmt(cpp):'-',cls:cppCls});
    }
    return {cells:cells};
  });
  tBody.appendChild(makeTable(headers,rows));
  tCard.appendChild(tBody);p.appendChild(tCard);

  var legend=div({style:{display:'flex',gap:'16px',fontSize:'10px',color:'var(--text-muted)',marginTop:'6px'}});
  legend.innerHTML='<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:'+C.green+';border-radius:2px"></span>Top 5 (\u20B93K+ spend)</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:'+C.red+';border-radius:2px"></span>Bottom 5 (\u20B93K+ spend)</span>';
  p.appendChild(legend);
  return p;
}

// Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ RENDER Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ
function render(){
  aggregate(appState.startDate,appState.endDate);
  aggregateLW();

  var sd=new Date(appState.startDate+'T00:00:00'),ed=new Date(appState.endDate+'T00:00:00');
  var subText;
  if(sd.getMonth()===ed.getMonth()&&sd.getFullYear()===ed.getFullYear()){
    subText=MONTHS[sd.getMonth()]+' '+sd.getDate()+'-'+ed.getDate()+', '+ed.getFullYear();
  } else {
    subText=MONTHS[sd.getMonth()]+' '+sd.getDate()+' - '+MONTHS[ed.getMonth()]+' '+ed.getDate()+', '+ed.getFullYear();
  }
  document.getElementById('headerSubtitle').textContent='Meta Ads Performance \xB7 '+subText;

  var topC=document.getElementById('topTabsContainer');topC.innerHTML='';
  Object.keys(TABS).forEach(function(k){
    topC.appendChild(el('button',{className:'top-tab'+(appState.topTab===k?' active':''),textContent:TABS[k].label,onClick:function(){appState.topTab=k;appState.subTab='overall';appState.creativePill='All';render()}}));
  });

  var subC=document.getElementById('subTabsContainer');subC.innerHTML='';
  TABS[appState.topTab].subs.forEach(function(st){
    var btn=el('button',{className:'sub-tab'+(appState.subTab===st.id?' active':''),onClick:function(){appState.subTab=st.id;appState.creativePill='All';render()}});
    var dot=span({className:'dot'});dot.style.background=st.dot;
    btn.appendChild(dot);btn.appendChild(document.createTextNode(st.label));
    subC.appendChild(btn);
  });

  var content=document.getElementById('contentContainer');content.innerHTML='';
  var view;
  try{
    if(appState.topTab==='programs'){
      switch(appState.subTab){
        case 'overall':view=buildProgramsOverall();break;
        case 'diabetes':view=buildTherapyView('Diabetes');break;
        case 'obesity':view=buildTherapyView('Obesity');break;
        case 'prediabetes':view=buildTherapyView('Pre-Diabetes');break;
        case 'creatives':view=buildCreatives(PT);break;
        default:view=buildProgramsOverall();
      }
    } else {
      switch(appState.subTab){
        case 'overall':view=buildStoreOverall();break;
        case 'cgm':view=buildTherapyView('CGM');break;
        case 'bca':view=buildTherapyView('BCA');break;
        case 'pcos':view=buildTherapyView('PCOS');break;
        case 'creatives':view=buildCreatives(ST);break;
        default:view=buildStoreOverall();
      }
    }
  }catch(e){console.error('Render error:',e);view=div({style:{padding:'24px',color:C.red},textContent:'Error: '+e.message})}
  content.appendChild(view);
}

// Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ LIVE DATA LOADER Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ
function loadLiveData(){
  var overlay=document.getElementById('loadingOverlay');
  if(overlay)overlay.style.display='flex';
  return fetch('/api/data')
    .then(function(r){if(!r.ok)throw new Error('API returned '+r.status);return r.json()})
    .then(function(data){
      DAILY_CREATIVES=data.dailyCreatives||{};
      CREATIVE_IMAGES=data.creativeImages||{};
      DATA_LOADED=true;
      // Set date range from data
      var meta=data.meta||{};
      var dr=meta.dateRange||{};
      if(dr.min&&dr.max){
        // MTD = 1st of current month to max date
        var maxD=new Date(dr.max+'T00:00:00');
        var mtdStart=maxD.getFullYear()+'-'+String(maxD.getMonth()+1).padStart(2,'0')+'-01';
        appState.startDate=mtdStart;
        appState.endDate=dr.max;
        document.getElementById('startDate').value=mtdStart;
        document.getElementById('endDate').value=dr.max;
      }
      // Update status badge
      var badge=document.getElementById('liveBadge');
      if(badge){
        badge.textContent='LIVE: '+meta.dates+' days, '+(meta.classified||0)+' ads';
        badge.style.background='rgba(22,163,74,0.1)';badge.style.color='#16a34a';
      }
      console.log('AdRadar live data loaded:',meta);
      render();
    })
    .catch(function(err){
      console.error('Failed to load live data:',err);
      var overlay=document.getElementById('loadingOverlay');
      if(overlay){
        overlay.querySelector('.loading-text').textContent='Failed to load data: '+err.message;
        overlay.querySelector('.loading-text').style.color='#ef4444';
        overlay.querySelector('.loading-sub').textContent='Check console for details. Try refreshing.';
      }
    })
    .finally(function(){
      var overlay=document.getElementById('loadingOverlay');
      if(overlay&&DATA_LOADED)overlay.style.display='none';
    });
}

// Initial load
loadLiveData();
